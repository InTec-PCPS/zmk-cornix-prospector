name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths:
      - "boards/*"
      - "config/*"
    tags-ignore:
      - "*"

jobs:
  dongle:
    if: github.event_name == 'push'
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: build.dongle.yaml

  full:
    if: github.event_name == 'workflow_dispatch'
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
