CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

# --- 発熱対策(メイン基盤=XIAOのはんだ延命) ---
# 無操作idle時に描画タイマー停止(lv_task_handler停止)+display_blanking。
# nRFのCPU/SPI稼働が止まりメイン基盤の発熱が下がる。入力で自動復帰。
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
# idle到達(=描画停止)を60秒に。idle_dimの消灯(60秒)と揃える。30秒減光はidle前。
CONFIG_ZMK_IDLE_TIMEOUT=60000

# --- 画面消灯時にタッチで復帰 (Waveshare 1.69" の CST816S) ---
# ZMK_POINTING を有効にすると activity.c が全 Zephyr 入力イベント(=タッチ)を
# activity として扱い、ZMK 側の idle 復帰(描画再開=display_blanking_off)が自動化される。
# タッチは画面復帰専用。input-listener ノードを置かないのでホストへのポインタ/HID 出力はしない。
# バックライト(BL=0%)の復帰は prospector-zmk-module 側の idle_dim.c が input コールバックで行う。
CONFIG_ZMK_POINTING=y
CONFIG_INPUT_CST816S=y
CONFIG_INPUT_CST816S_INTERRUPT=y
# 復帰専用なので input スレッドは小さめで足りる(ジェスチャ処理はしない)。RAM 節約。
CONFIG_INPUT_THREAD_STACK_SIZE=2048

# --- 画面点灯中のロングタップで接続先選択メニュー(USB/BT1-4 + クリア) ---
# タッチを LVGL ポインタ入力として登録し、画面上のボタンをタップ操作できるようにする。
CONFIG_LV_Z_POINTER_INPUT=y
CONFIG_PROSPECTOR_TOUCH_OUTPUT_MENU=y
