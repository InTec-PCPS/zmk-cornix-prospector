# Build matrix for push-triggered CI: dongle firmware only.
# The full keyboard + dongle build matrix is in build.yaml and is
# run only on manual workflow_dispatch (or tag releases).
---
include:
  - board: xiao_ble/nrf52840/zmk
    shield: cornix_prospector prospector_adapter
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: prospector_dongle
